# Deploys all static content to GitHub Pages in a single deployment.
# Benchmark results are served at the site root; extra plots at /extra/.
name: Deploy Pages

on:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: Bogdanp/setup-racket@v1.7
        with:
          architecture: "x64"
          distribution: "full"
          version: "current"

      - name: Generate Scribble
        run: cd benchmarks; raco scribble --htmls results.scribl; cd ..

      - name: Stage site
        run: |
          mkdir -p _site/extra
          cp -r benchmarks/results/* _site/       # -> /
          cp -r extra/plots/*        _site/extra/  # -> /extra/

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
